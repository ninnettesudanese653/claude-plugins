name: Sync agent-browser skill

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest SKILL.md from agent-browser
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/Brainrot-Creations/agent-browser/main/skills/agent-browser/SKILL.md" \
            -o plugins/agent-browser/skills/agent-browser/SKILL.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet plugins/agent-browser/skills/agent-browser/SKILL.md; then
            echo "No changes — skill is already up to date"
            exit 0
          fi

          git add plugins/agent-browser/skills/agent-browser/SKILL.md
          git commit -m "chore: sync agent-browser skill from upstream"
          git push
